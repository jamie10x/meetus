# Local development stack: infrastructure only.
# The API, worker, and frontend run on the host during development.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meetus
      POSTGRES_PASSWORD: meetus
      POSTGRES_DB: meetus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetus"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
