# Production stack. Run from the repo root:
#   docker compose -f deploy/docker-compose.yml --env-file /etc/meetus/meetus.env up -d
# The systemd unit in deploy/systemd/ does exactly that.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meetus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in /etc/meetus/meetus.env}
      POSTGRES_DB: ${POSTGRES_DB:-meetus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meetus}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    entrypoint: ["/usr/local/bin/migrate", "up"]
    environment: &backend-env
      APP_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-meetus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meetus}?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:?}
      TICKET_SECRET: ${TICKET_SECRET:?}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_OFFICIAL_CHANNEL_ID: ${TELEGRAM_OFFICIAL_CHANNEL_ID}
      TELEGRAM_OFFICIAL_CHANNEL_LANGUAGE: ${TELEGRAM_OFFICIAL_CHANNEL_LANGUAGE}
      API_BASE_URL: ${API_BASE_URL:?}
      WEB_BASE_URL: ${WEB_BASE_URL:?}
      UPLOAD_DIR: /uploads
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    environment: *backend-env
    volumes:
      - uploads:/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    entrypoint: ["/usr/local/bin/worker"]
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_BASE_URL}
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_HOST: ${SITE_HOST:?e.g. meetus.uz}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
  redisdata:
  uploads:
  caddy_data:
  caddy_config:
